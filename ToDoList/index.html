<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>ToDo List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <main class="container mt-5" style="max-width: 500px;">
        <h3 class="text-center mb-4">My list of tasks</h3>
        <p class="text-center text-muted small mb-3">
            Click on the task to mark as done
        </p>
        <div class="input-group mb-3">
            <input type="text" id="taskInput" class="form-control" placeholder="Enter a task...">
            <button id="addBtn" class="btn btn-primary" type="button">Add</button>
        </div>

        <ul id="taskList" class="list-group">
        </ul>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
